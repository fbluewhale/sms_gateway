name: code_challenge

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sms_gateway}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
      network: host
      args:
        HTTP_PROXY: ${HTTP_PROXY:-http://127.0.0.1:10808}
        HTTPS_PROXY: ${HTTPS_PROXY:-http://127.0.0.1:10808}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    environment:
      APP_ENV: production
      SERVER_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-sms_gateway}
      DB_SSLMODE: disable
      ADMIN_API_KEY: ${ADMIN_API_KEY:-local-admin-key}
      HTTP_PROXY: http://host.docker.internal:10808
      HTTPS_PROXY: http://host.docker.internal:10808
      NO_PROXY: postgres,localhost,127.0.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    init: true
    stop_grace_period: 15s
    restart: unless-stopped

volumes:
  postgres-data:
