name: code_challenge

services:
  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-sms}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-sms}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sms_gateway}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis-data:/data
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      network: host
      args:
        HTTP_PROXY: ${HTTP_PROXY:-http://127.0.0.1:10808}
        HTTPS_PROXY: ${HTTPS_PROXY:-http://127.0.0.1:10808}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    environment:
      APP_ENV: production
      SERVER_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-sms_gateway}
      DB_SSLMODE: disable
      ADMIN_API_KEY: ${ADMIN_API_KEY:-local-admin-key}
      BROKER_URL: amqp://${RABBITMQ_USER:-sms}:${RABBITMQ_PASSWORD:-sms}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      EXPRESS_SMS_SLA: ${EXPRESS_SMS_SLA:-5s}
      EXPRESS_INFLIGHT_LIMIT: ${EXPRESS_INFLIGHT_LIMIT:-100}
      NORMAL_INFLIGHT_LIMIT: ${NORMAL_INFLIGHT_LIMIT:-20}
      SMS_PROVIDER_TIMEOUT: ${SMS_PROVIDER_TIMEOUT:-10s}
      HTTP_PROXY: http://host.docker.internal:10808
      HTTPS_PROXY: http://host.docker.internal:10808
      NO_PROXY: postgres,localhost,127.0.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    init: true
    stop_grace_period: 15s
    restart: unless-stopped

  outbox-dispatcher:
    image: code_challenge-api
    command: ["/app/outbox-dispatcher"]
    entrypoint: []
    environment: &worker-env
      APP_ENV: production
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-sms_gateway}
      DB_SSLMODE: disable
      ADMIN_API_KEY: ${ADMIN_API_KEY:-local-admin-key}
      BROKER_URL: amqp://${RABBITMQ_USER:-sms}:${RABBITMQ_PASSWORD:-sms}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      SMS_PROVIDER_TIMEOUT: ${SMS_PROVIDER_TIMEOUT:-10s}
    depends_on: &worker-dependencies
      postgres: {condition: service_healthy}
      rabbitmq: {condition: service_healthy}
      redis: {condition: service_healthy}
    restart: unless-stopped

  express-worker:
    image: code_challenge-api
    command: ["/app/sms-worker", "-line", "express", "-prefetch", "40", "-concurrency", "20"]
    entrypoint: []
    environment: *worker-env
    depends_on: *worker-dependencies
    deploy:
      replicas: ${EXPRESS_WORKER_REPLICAS:-3}
    restart: unless-stopped

  normal-worker:
    image: code_challenge-api
    command: ["/app/sms-worker", "-line", "normal", "-prefetch", "10", "-concurrency", "5"]
    entrypoint: []
    environment: *worker-env
    depends_on: *worker-dependencies
    deploy:
      replicas: ${NORMAL_WORKER_REPLICAS:-2}
    restart: unless-stopped

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
